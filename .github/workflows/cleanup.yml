name: Cleanup Old Data

on:
  schedule:
    - cron: '0 3 */3 * *'  # every 3 days at 3am UTC
  workflow_dispatch: # manual runs

permissions:
  contents: read

env:
  KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
  KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci  # node-fetch@^3 and @supabase/supabase-js come from package-lock.json

      - name: Cleanup Vercel KV
        run: node scripts/cleanup-vercel-kv.js

      - name: Cleanup Supabase
        run: node scripts/cleanup-supabase.js
